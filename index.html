<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TermiTask</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: "Courier New", monospace; margin: 0; padding: 15px; }
        #status-bar { color: #555; font-size: 0.8em; margin-bottom: 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        #output { margin-bottom: 60px; user-select: text; }
        .log-entry { margin-bottom: 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        #input-area { display: flex; position: fixed; bottom: 20px; width: 90%; background: #0a0a0a; }
        input { background: transparent; border: none; color: #00ff00; font: inherit; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="status-bar">
        <div id="active-text">System Ready</div>
    </div>
    <div id="output"></div>
    <div id="input-area"><span>&gt;&nbsp;</span><input type="text" id="cmd" autofocus autocomplete="off"></div>

    <script src=".js/engine.js" type="module"></script>
</body>
</html>
